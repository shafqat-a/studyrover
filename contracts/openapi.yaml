# StudyRover — OpenAPI 3.1 root document (W01) — ASSEMBLED, self-contained.
#
# The single assembled contract: document metadata, the cookie-session security
# scheme, every Phase 1 path, and a components block that INLINES every per-entity
# schema from contracts/components/*.yaml (the C-tasks remain authoritative for
# those fragments; W01 assembles them here so the document is self-contained and
# codegen-friendly).
#
# This is the ONLY file that declares `paths`. Codegen consumes THIS file:
#   - oapi-codegen        -> backend/internal/contracts/contracts.gen.go (Go models + chi server)
#   - openapi-typescript  -> frontend/src/api/schema.d.ts (TS types)
#
# Do NOT hand-edit the inlined component schemas here — edit the owning
# contracts/components/*.yaml fragment and re-run the W01 assembly + `make gen`.
# Cross-language rule: JSON is camelCase; IDs are strings (UUID/cuid);
# timestamps are RFC 3339 strings.
#
openapi: 3.1.0
info:
  title: StudyRover API
  version: 0.1.0
  description: StudyRover Phase 1 — the tutoring core. A parent sets up subjects/topics/questions/exams;
    a student takes exams; the system produces scores + mastery and emits a ScoreEvent. JSON over HTTP;
    parent cookie session required except for the student exam + student-auth endpoints.
  license:
    name: Proprietary
servers:
- url: /api
  description: StudyRover API, served by the Go binary under the /api base path.
security:
- cookieSession: []
tags:
- name: subjects
- name: sources
- name: topics
- name: examDefinitions
- name: questions
- name: student
- name: settings
- name: attempts
- name: auth
- name: progress
- name: tutor
- name: studyGuides
- name: jobs
- name: syllabus
- name: questionDrafts
- name: tutorInstructions
- name: guidance
- name: dashboard
paths:
  /subjects:
    get:
      operationId: listSubjects
      tags:
      - subjects
      summary: List subjects
      parameters:
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: A page of subjects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageOfSubject'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createSubject
      tags:
      - subjects
      summary: Create a subject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubject'
      responses:
        '201':
          description: The created subject.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subject'
        default:
          $ref: '#/components/responses/Problem'
  /subjects/{id}:
    parameters:
    - $ref: '#/components/parameters/IdPath'
    get:
      operationId: getSubject
      tags:
      - subjects
      summary: Get a subject
      responses:
        '200':
          description: The subject.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subject'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: updateSubject
      tags:
      - subjects
      summary: Update a subject (partial)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Subject'
      responses:
        '200':
          description: The updated subject.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subject'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteSubject
      tags:
      - subjects
      summary: Delete a subject
      responses:
        '204':
          description: The subject was deleted.
        default:
          $ref: '#/components/responses/Problem'
  /sources:
    get:
      operationId: listSources
      tags:
      - sources
      summary: List sources for a subject
      parameters:
      - name: subjectId
        in: query
        required: false
        schema:
          type: string
        description: Filter sources to a single subject.
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: A page of sources.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageOfSource'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createSource
      tags:
      - sources
      summary: Create a source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSource'
      responses:
        '201':
          description: The created source.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
        default:
          $ref: '#/components/responses/Problem'
  /sources/{id}:
    parameters:
    - $ref: '#/components/parameters/IdPath'
    get:
      operationId: getSource
      tags:
      - sources
      summary: Get a source
      responses:
        '200':
          description: The source.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteSource
      tags:
      - sources
      summary: Delete a source
      responses:
        '204':
          description: The source was deleted.
        default:
          $ref: '#/components/responses/Problem'
  /topics:
    get:
      operationId: listTopics
      tags:
      - topics
      summary: List topics for a subject
      parameters:
      - name: subjectId
        in: query
        required: false
        schema:
          type: string
        description: Filter topics to a single subject.
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: A page of topics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageOfTopic'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createTopic
      tags:
      - topics
      summary: Create a topic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTopic'
      responses:
        '201':
          description: The created topic.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Topic'
        default:
          $ref: '#/components/responses/Problem'
  /topics/{id}:
    parameters:
    - $ref: '#/components/parameters/IdPath'
    get:
      operationId: getTopic
      tags:
      - topics
      summary: Get a topic
      responses:
        '200':
          description: The topic.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Topic'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: updateTopic
      tags:
      - topics
      summary: Update a topic (partial)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Topic'
      responses:
        '200':
          description: The updated topic.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Topic'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteTopic
      tags:
      - topics
      summary: Delete a topic
      responses:
        '204':
          description: The topic was deleted.
        default:
          $ref: '#/components/responses/Problem'
  /exam-definitions:
    get:
      operationId: listExamDefinitions
      tags:
      - examDefinitions
      summary: List exam definitions for a subject
      parameters:
      - name: subjectId
        in: query
        required: false
        schema:
          type: string
        description: Filter exam definitions to a single subject.
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: A page of exam definitions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageOfExamDefinition'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createExamDefinition
      tags:
      - examDefinitions
      summary: Create an exam definition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExamDefinition'
      responses:
        '201':
          description: The created exam definition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExamDefinition'
        default:
          $ref: '#/components/responses/Problem'
  /exam-definitions/{id}:
    parameters:
    - $ref: '#/components/parameters/IdPath'
    get:
      operationId: getExamDefinition
      tags:
      - examDefinitions
      summary: Get an exam definition
      responses:
        '200':
          description: The exam definition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExamDefinition'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: updateExamDefinition
      tags:
      - examDefinitions
      summary: Update an exam definition (partial)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExamDefinition'
      responses:
        '200':
          description: The updated exam definition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExamDefinition'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteExamDefinition
      tags:
      - examDefinitions
      summary: Delete an exam definition
      responses:
        '204':
          description: The exam definition was deleted.
        default:
          $ref: '#/components/responses/Problem'
  /questions:
    get:
      operationId: listQuestions
      tags:
      - questions
      summary: List questions for a subject / topic
      parameters:
      - name: subjectId
        in: query
        required: false
        schema:
          type: string
        description: Filter questions to a single subject.
      - name: topicId
        in: query
        required: false
        schema:
          type: string
        description: Filter questions to a single topic.
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: A page of questions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageOfQuestion'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: createQuestion
      tags:
      - questions
      summary: Create a question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQuestion'
      responses:
        '201':
          description: The created question.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'
        default:
          $ref: '#/components/responses/Problem'
  /questions/{id}:
    parameters:
    - $ref: '#/components/parameters/IdPath'
    get:
      operationId: getQuestion
      tags:
      - questions
      summary: Get a question
      responses:
        '200':
          description: The question.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: updateQuestion
      tags:
      - questions
      summary: Update a question (partial)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Question'
      responses:
        '200':
          description: The updated question.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      operationId: deleteQuestion
      tags:
      - questions
      summary: Delete a question
      responses:
        '204':
          description: The question was deleted.
        default:
          $ref: '#/components/responses/Problem'
  /student:
    get:
      operationId: getStudent
      tags:
      - student
      summary: Get the student profile
      responses:
        '200':
          description: The student profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Student'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: updateStudent
      tags:
      - student
      summary: Update the student profile (partial)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Student'
      responses:
        '200':
          description: The updated student profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Student'
        default:
          $ref: '#/components/responses/Problem'
  /settings:
    get:
      operationId: getSettings
      tags:
      - settings
      summary: Get the application settings singleton
      responses:
        '200':
          description: The settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: updateSettings
      tags:
      - settings
      summary: Update settings (partial)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Settings'
      responses:
        '200':
          description: The updated settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
        default:
          $ref: '#/components/responses/Problem'
  /attempts:
    get:
      operationId: listAttempts
      tags:
      - attempts
      summary: List exam attempts for a student
      parameters:
      - name: studentId
        in: query
        required: false
        schema:
          type: string
        description: Filter attempts to a single student.
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: A page of exam attempts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageOfExamAttempt'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: startAttempt
      tags:
      - attempts
      summary: Start a new exam attempt
      description: Assembles the exam and persists an in_progress attempt, returning the attempt plus
        the delivered questions (without the answer key).
      security:
      - cookieSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartAttempt'
      responses:
        '201':
          description: The started attempt and its delivered questions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartAttemptResult'
        default:
          $ref: '#/components/responses/Problem'
  /attempts/{id}:
    parameters:
    - $ref: '#/components/parameters/IdPath'
    get:
      operationId: getAttempt
      tags:
      - attempts
      summary: Get an in-progress attempt (no answers revealed)
      responses:
        '200':
          description: The attempt (delivered, no answers).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExamAttempt'
        default:
          $ref: '#/components/responses/Problem'
  /attempts/{id}/submit:
    parameters:
    - $ref: '#/components/parameters/IdPath'
    post:
      operationId: submitAttempt
      tags:
      - attempts
      summary: Submit answers and grade the attempt
      description: Grades the attempt server-side, persists the graded result, and returns the graded
        attempt plus the emitted ScoreEvent (the Phase 3 seam).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitAttempt'
      responses:
        '200':
          description: The graded attempt and the emitted score event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitAttemptResult'
        default:
          $ref: '#/components/responses/Problem'
  /attempts/{id}/result:
    parameters:
    - $ref: '#/components/parameters/IdPath'
    get:
      operationId: getAttemptResult
      tags:
      - attempts
      summary: Get the graded result of an attempt (answers revealed)
      responses:
        '200':
          description: The graded attempt with answers revealed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExamAttempt'
        default:
          $ref: '#/components/responses/Problem'
  /auth/register:
    post:
      operationId: authRegister
      tags:
      - auth
      summary: Parent WebAuthn registration ceremony (begin/finish)
      description: Drives the parent WebAuthn registration ceremony. The opaque ceremony payload (begin
        options or the authenticator response) is passed through to go-webauthn. On finish, a Session
        is returned and the session cookie is set.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebAuthnCeremony'
      responses:
        '200':
          description: Ceremony options, or a Session on a successful finish.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'
        default:
          $ref: '#/components/responses/Problem'
  /auth/login:
    post:
      operationId: authLogin
      tags:
      - auth
      summary: Parent WebAuthn login ceremony (begin/finish)
      description: Drives the parent WebAuthn authentication ceremony. The opaque ceremony payload is
        passed through to go-webauthn. On finish, a Session is returned and the session cookie is set.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebAuthnCeremony'
      responses:
        '200':
          description: Ceremony options, or a Session on a successful finish.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResult'
        default:
          $ref: '#/components/responses/Problem'
  /auth/student:
    post:
      operationId: authStudent
      tags:
      - auth
      summary: Student sign-in
      description: Signs a student in (optionally with a PIN) and sets the session cookie.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentSignIn'
      responses:
        '200':
          description: The student session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        default:
          $ref: '#/components/responses/Problem'
  /progress:
    get:
      operationId: getProgress
      tags:
      - progress
      summary: Get a student's mastery, streak, and attempt history
      parameters:
      - name: studentId
        in: query
        required: false
        schema:
          type: string
        description: The student whose progress to return.
      responses:
        '200':
          description: The student's progress summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Progress'
        default:
          $ref: '#/components/responses/Problem'
  /tutor/conversations:
    post:
      operationId: createConversation
      tags:
      - tutor
      summary: Start a new AI tutor conversation
      description: Creates a tutor chat session scoped to a subject for a student (2-A01).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversation'
      responses:
        '201':
          description: The created conversation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        default:
          $ref: '#/components/responses/Problem'
  /tutor/conversations/{id}:
    parameters:
    - $ref: '#/components/parameters/IdPath'
    get:
      operationId: getConversation
      tags:
      - tutor
      summary: Get a conversation and its messages
      description: Returns the conversation plus its full message history, newest last (2-A03).
      responses:
        '200':
          description: The conversation and its messages.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationWithMessages'
        default:
          $ref: '#/components/responses/Problem'
  /tutor/conversations/{id}/messages:
    parameters:
    - $ref: '#/components/parameters/IdPath'
    post:
      operationId: postMessage
      tags:
      - tutor
      summary: Post a student message and stream the AI tutor's answer
      description: Posts a student message to the conversation and streams the grounded AI tutor answer
        as Server-Sent Events; each event's data payload is a JSON-encoded AnswerChunk (2-A02).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AskRequest'
      responses:
        '200':
          description: A Server-Sent Events stream of AnswerChunk payloads.
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/AnswerChunk'
        default:
          $ref: '#/components/responses/Problem'
  /subjects/{id}/study-guide:
    parameters:
    - $ref: '#/components/parameters/IdPath'
    get:
      operationId: getStudyGuide
      tags:
      - studyGuides
      summary: Get the latest study guide for a subject
      description: Returns the most recently generated study guide for the subject, optionally scoped
        to a topic (2-A04).
      parameters:
      - name: topicId
        in: query
        required: false
        schema:
          type: string
        description: Optional topic to scope the study guide to.
      responses:
        '200':
          description: The study guide.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyGuide'
        default:
          $ref: '#/components/responses/Problem'
    post:
      operationId: generateStudyGuide
      tags:
      - studyGuides
      summary: Generate a study guide for a subject
      description: Generates a citation-grounded markdown study guide for the subject, optionally scoped
        to a topic (2-A04).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuideRequest'
      responses:
        '200':
          description: The generated study guide.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyGuide'
        default:
          $ref: '#/components/responses/Problem'
  /sources/ingest:
    post:
      operationId: ingestSource
      tags:
      - sources
      summary: Ingest a source asynchronously
      description: Submits a source for async ingestion/OCR via the knowledge backend, returning a Job
        that clients poll for processing -> ready/error (2-A05).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSource'
      responses:
        '202':
          description: The async ingestion job.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        default:
          $ref: '#/components/responses/Problem'
  /jobs:
    get:
      operationId: listJobs
      tags:
      - jobs
      summary: List async jobs
      description: Lists async jobs, optionally filtered by subject (2-A06).
      parameters:
      - name: subjectId
        in: query
        required: false
        schema:
          type: string
        description: Filter jobs to a single subject.
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: A page of jobs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageOfJob'
        default:
          $ref: '#/components/responses/Problem'
  /jobs/{id}:
    parameters:
    - $ref: '#/components/parameters/IdPath'
    get:
      operationId: getJob
      tags:
      - jobs
      summary: Get an async job (poll or SSE)
      description: Returns the current state of an async job. With Accept application/json the job is
        returned once; with Accept text/event-stream the job is streamed as Server-Sent Events whose
        data payload is a JSON-encoded Job until it reaches ready/error (2-A06).
      responses:
        '200':
          description: The job (single fetch) or a stream of job updates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
            text/event-stream:
              schema:
                $ref: '#/components/schemas/Job'
        default:
          $ref: '#/components/responses/Problem'
  /subjects/{id}/syllabus/suggest:
    parameters:
    - $ref: '#/components/parameters/IdPath'
    post:
      operationId: suggestSyllabus
      tags:
      - syllabus
      summary: Derive a suggested syllabus for a subject
      description: Kicks off async derivation of a suggested topic tree from the subject's ingested
        sources; returns a Job whose result holds a TopicSuggestion[] (2-A07).
      responses:
        '202':
          description: The async syllabus-derivation job.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        default:
          $ref: '#/components/responses/Problem'
  /subjects/{id}/syllabus/apply:
    parameters:
    - $ref: '#/components/parameters/IdPath'
    post:
      operationId: applySyllabus
      tags:
      - syllabus
      summary: Apply a suggested syllabus to a subject
      description: Materializes a (possibly parent-edited) suggested topic tree into real Topics (2-A08).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplySyllabusRequest'
      responses:
        '200':
          description: The created topics.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Topic'
        default:
          $ref: '#/components/responses/Problem'
  /questions/generate:
    post:
      operationId: generateQuestions
      tags:
      - questionDrafts
      summary: Generate question drafts for a subject
      description: Kicks off async generation of question drafts for a subject (optionally scoped to a
        topic); returns a Job whose result holds a QuestionDraft[] (2-A09).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenRequest'
      responses:
        '202':
          description: The async question-generation job.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        default:
          $ref: '#/components/responses/Problem'
  /questions/drafts:
    get:
      operationId: listQuestionDrafts
      tags:
      - questionDrafts
      summary: List question drafts
      description: Lists generated question drafts awaiting review, optionally filtered by subject and
        topic (2-A10).
      parameters:
      - name: subjectId
        in: query
        required: false
        schema:
          type: string
        description: Filter drafts to a single subject.
      - name: topicId
        in: query
        required: false
        schema:
          type: string
        description: Filter drafts to a single topic.
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: A page of question drafts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageOfQuestionDraft'
        default:
          $ref: '#/components/responses/Problem'
  /questions/drafts/{id}/approve:
    parameters:
    - $ref: '#/components/parameters/IdPath'
    post:
      operationId: approveQuestionDraft
      tags:
      - questionDrafts
      summary: Approve a question draft into the live bank
      description: Approves a pending draft, assigning Option ids and resolving correctOptionId, and
        returns the created Question (2-A10).
      responses:
        '201':
          description: The created question.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'
        default:
          $ref: '#/components/responses/Problem'
  /questions/drafts/{id}/reject:
    parameters:
    - $ref: '#/components/parameters/IdPath'
    post:
      operationId: rejectQuestionDraft
      tags:
      - questionDrafts
      summary: Reject a question draft
      description: Marks a pending draft as rejected so it never enters the live question bank (2-A10).
      responses:
        '200':
          description: The rejected draft.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionDraft'
        default:
          $ref: '#/components/responses/Problem'
  /subjects/{id}/tutor-instructions:
    parameters:
    - $ref: '#/components/parameters/IdPath'
    get:
      operationId: getTutorInstructions
      tags:
      - tutorInstructions
      summary: Get the per-subject tutor instructions
      description: Returns the parent-set instructions steering the AI tutor for this subject (2-A11).
      responses:
        '200':
          description: The tutor instructions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TutorInstructions'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: updateTutorInstructions
      tags:
      - tutorInstructions
      summary: Set the per-subject tutor instructions
      description: Creates or replaces the parent-set instructions steering the AI tutor for this
        subject (2-A11).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TutorInstructions'
      responses:
        '200':
          description: The updated tutor instructions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TutorInstructions'
        default:
          $ref: '#/components/responses/Problem'
  /guidance:
    get:
      operationId: getGuidance
      tags:
      - guidance
      summary: Get parent guidance to the tutor
      description: Returns the parent guidance steering the AI tutor, optionally scoped to a subject;
        global guidance is returned when no subjectId is given (2-A12).
      parameters:
      - name: subjectId
        in: query
        required: false
        schema:
          type: string
        description: Filter guidance to a single subject; omit for global guidance.
      responses:
        '200':
          description: The matching guidance entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Guidance'
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: updateGuidance
      tags:
      - guidance
      summary: Create or replace parent guidance
      description: Creates or replaces parent guidance steering the AI tutor (global or subject-scoped)
        and returns the stored Guidance (2-A12).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGuidance'
      responses:
        '200':
          description: The stored guidance.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guidance'
        default:
          $ref: '#/components/responses/Problem'
  /dashboard:
    get:
      operationId: getDashboard
      tags:
      - dashboard
      summary: Get the parent study dashboard for a student
      description: Returns the aggregated parent-facing dashboard for a student — mastery, mastery
        timeline, exam history, average score, streak, and parent guidance (2-A13).
      parameters:
      - name: studentId
        in: query
        required: false
        schema:
          type: string
        description: The student whose dashboard to return.
      responses:
        '200':
          description: The dashboard.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dashboard'
        default:
          $ref: '#/components/responses/Problem'
components:
  securitySchemes:
    cookieSession:
      type: apiKey
      in: cookie
      name: sr_session
      description: HTTP-only session cookie issued by /auth/* after a successful WebAuthn (parent) or
        PIN (student) ceremony. Carries the role + subject id.
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      description: Resource identifier (UUID/cuid).
      schema:
        type: string
    PageParam:
      name: page
      in: query
      required: false
      description: 1-based page number to return.
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      name: pageSize
      in: query
      required: false
      description: Maximum number of items per page.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
  responses:
    Problem:
      description: An error occurred; the body is an RFC 7807-style problem.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    AttemptStatus:
      type: string
      description: Lifecycle state of an exam attempt.
      enum:
      - in_progress
      - submitted
    Answer:
      type: object
      description: A single answer within an attempt. selectedOptionId is absent when the student left
        the question unanswered; correct is populated only after server-side grading.
      additionalProperties: false
      required:
      - questionId
      properties:
        questionId:
          type: string
          description: The question this answer responds to.
        selectedOptionId:
          type: string
          description: The option the student selected, if any.
        correct:
          type: boolean
          description: Whether the selected option was correct (set on grading).
    PerTopicScore:
      type: object
      description: Per-topic correct/total breakdown for an attempt. Canonical definition; ScoreEvent
        references this same shape.
      additionalProperties: false
      required:
      - topicId
      - correct
      - total
      properties:
        topicId:
          type: string
          description: The topic these counts belong to.
        correct:
          type: integer
          description: Number of correctly answered questions for this topic.
          minimum: 0
        total:
          type: integer
          description: Total number of questions for this topic in the attempt.
          minimum: 0
    ExamAttempt:
      type: object
      description: A student's attempt at an exam definition. Created in_progress with the assembled questionIds;
        graded fields (scorePct, passed, perTopic, cooldownUntil, submittedAt) are populated after submission.
      additionalProperties: false
      required:
      - id
      - examDefinitionId
      - studentId
      - status
      - questionIds
      - answers
      - startedAt
      properties:
        id:
          type: string
          description: Unique attempt id.
        examDefinitionId:
          type: string
          description: The exam definition this attempt is for.
        studentId:
          type: string
          description: The student taking the exam.
        status:
          allOf:
          - $ref: '#/components/schemas/AttemptStatus'
          description: Current lifecycle state.
          default: in_progress
        questionIds:
          type: array
          description: The assembled question ids, in delivery order.
          items:
            type: string
        answers:
          type: array
          description: The student's answers; empty until questions are answered.
          default: []
          items:
            $ref: '#/components/schemas/Answer'
        scorePct:
          type: integer
          description: Overall score percentage (0–100); present once graded.
          minimum: 0
          maximum: 100
        passed:
          type: boolean
          description: Whether the attempt met the exam pass bar; present once graded.
        perTopic:
          type: array
          description: Per-topic breakdown; present once graded.
          items:
            $ref: '#/components/schemas/PerTopicScore'
        cooldownUntil:
          type: string
          format: date-time
          description: RFC 3339 timestamp until which a new attempt is blocked after a failed attempt;
            absent when there is no active cooldown.
        startedAt:
          type: string
          format: date-time
          description: When the attempt was started.
        submittedAt:
          type: string
          format: date-time
          description: When the attempt was submitted; absent while in_progress.
    StartAttempt:
      type: object
      description: Request body to start a new exam attempt.
      additionalProperties: false
      required:
      - examDefinitionId
      - studentId
      properties:
        examDefinitionId:
          type: string
          description: The exam definition to attempt.
        studentId:
          type: string
          description: The student starting the attempt.
    SubmitAttempt:
      type: object
      description: Request body to submit answers for grading.
      additionalProperties: false
      required:
      - answers
      properties:
        answers:
          type: array
          description: The submitted answers, one entry per answered question.
          items:
            type: object
            additionalProperties: false
            required:
            - questionId
            - selectedOptionId
            properties:
              questionId:
                type: string
                description: The question being answered.
              selectedOptionId:
                type: string
                description: The selected option id.
    PageOfExamAttempt:
      type: object
      description: A paginated page of exam attempts.
      additionalProperties: false
      required:
      - items
      - total
      - page
      - pageSize
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ExamAttempt'
        total:
          type: integer
          description: Total number of attempts matching the query.
          minimum: 0
        page:
          type: integer
          description: 1-based page number.
          minimum: 1
        pageSize:
          type: integer
          description: Number of items per page.
          minimum: 1
    Parent:
      type: object
      description: A parent/guardian account, authenticated via WebAuthn (FIDO2).
      additionalProperties: false
      required:
      - id
      - displayName
      - email
      - createdAt
      properties:
        id:
          type: string
          description: Unique parent id (UUID/cuid).
        displayName:
          type: string
          description: Human-readable name shown in the UI.
        email:
          type: string
          format: email
          description: Parent email address (also the WebAuthn user name).
        createdAt:
          type: string
          format: date-time
          description: RFC 3339 creation timestamp.
    Credential:
      type: object
      description: A registered WebAuthn (FIDO2) credential belonging to a parent. Stores the public key
        + signature counter used to verify assertions.
      additionalProperties: false
      required:
      - id
      - parentId
      - credentialId
      - publicKey
      - counter
      - isBackup
      properties:
        id:
          type: string
          description: Unique credential record id (UUID/cuid).
        parentId:
          type: string
          description: Id of the owning Parent.
        credentialId:
          type: string
          description: Base64url-encoded WebAuthn credential id.
        publicKey:
          type: string
          description: Base64url-encoded COSE public key.
        counter:
          type: integer
          format: int64
          description: Signature counter, used to detect cloned authenticators.
        isBackup:
          type: boolean
          default: false
          description: Whether the authenticator is backup-eligible / a backup device.
    RegisterBegin:
      type: object
      description: Body that starts the parent WebAuthn registration ceremony. The server replies with
        opaque registration options (handled by go-webauthn).
      additionalProperties: false
      required:
      - displayName
      - email
      properties:
        displayName:
          type: string
          description: Human-readable name for the new parent account.
        email:
          type: string
          format: email
          description: Parent email address (the WebAuthn user name).
    Session:
      type: object
      description: The active session identity returned after a successful auth ceremony. Mirrors what
        the server stores behind the sr_session cookie.
      additionalProperties: false
      required:
      - role
      - id
      properties:
        role:
          type: string
          description: Whether the session belongs to a parent or a student.
          enum:
          - parent
          - student
        id:
          type: string
          description: Id of the authenticated parent or student.
    WebAuthnCeremony:
      type: object
      description: Free-form WebAuthn ceremony payload (registration/authentication options or the authenticator's
        response). Opaque — the structure is owned by the WebAuthn libraries, not this contract.
      additionalProperties: true
    Code:
      type: string
      description: 'Machine-readable error category. Maps to the matching HTTP status: VALIDATION->422/400,
        NOT_FOUND->404, UNAUTHORIZED->401, CONFLICT->409, INTERNAL->500.'
      enum:
      - VALIDATION
      - NOT_FOUND
      - UNAUTHORIZED
      - CONFLICT
      - INTERNAL
    Problem:
      type: object
      description: RFC 7807-style problem detail returned for any error response. The HTTP status of the
        response matches the `status` field and the `code` category.
      additionalProperties: false
      required:
      - type
      - title
      - status
      - code
      properties:
        type:
          type: string
          description: A URI reference identifying the problem type. May be the literal "about:blank"
            when no specific type is defined.
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          description: The HTTP status code for this occurrence of the problem.
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence.
        code:
          $ref: '#/components/schemas/Code'
    ExamType:
      type: string
      description: Kind of exam. `gate` exams are the everyday internet-time gate; `formal` exams are
        heavier graded assessments.
      enum:
      - gate
      - formal
    RewardStyle:
      type: string
      description: How earned internet time relates to the score. `flat` grants the full time for the
        exam size on a pass; `scaled` multiplies by the score%.
      enum:
      - flat
      - scaled
    ExamDefinition:
      type: object
      description: A parent-configured exam template for a subject.
      additionalProperties: false
      required:
      - id
      - subjectId
      - name
      - type
      - scopeTopicIds
      - size
      - passBar
      - cooldownMin
      - rewardStyle
      - createdAt
      properties:
        id:
          type: string
          description: Stable identifier (UUID/cuid).
        subjectId:
          type: string
          description: The subject this exam template belongs to.
        name:
          type: string
          description: Human-readable name for the exam template.
        type:
          $ref: '#/components/schemas/ExamType'
          default: gate
        scopeTopicIds:
          type: array
          description: Topic ids the exam draws from. An empty array means the whole subject.
          items:
            type: string
          default: []
        size:
          type: integer
          description: Number of questions in the exam.
          minimum: 1
          default: 20
        passBar:
          type: integer
          description: Minimum score percentage required to pass.
          minimum: 0
          maximum: 100
          default: 70
        cooldownMin:
          type: integer
          description: Minutes a student must wait after a failed attempt.
          minimum: 0
          default: 10
        rewardStyle:
          $ref: '#/components/schemas/RewardStyle'
          default: flat
        createdAt:
          type: string
          format: date-time
          description: When the exam template was created (RFC 3339).
    CreateExamDefinition:
      type: object
      description: Request body to create an ExamDefinition. The server assigns `id` and `createdAt` and
        applies the spec §10 defaults for any omitted field.
      additionalProperties: false
      required:
      - subjectId
      - name
      properties:
        subjectId:
          type: string
          description: The subject this exam template belongs to.
        name:
          type: string
          description: Human-readable name for the exam template.
        type:
          $ref: '#/components/schemas/ExamType'
          default: gate
        scopeTopicIds:
          type: array
          description: Topic ids the exam draws from. An empty array (the default) means the whole subject.
          items:
            type: string
          default: []
        size:
          type: integer
          description: Number of questions in the exam.
          minimum: 1
          default: 20
        passBar:
          type: integer
          description: Minimum score percentage required to pass.
          minimum: 0
          maximum: 100
          default: 70
        cooldownMin:
          type: integer
          description: Minutes a student must wait after a failed attempt.
          minimum: 0
          default: 10
        rewardStyle:
          $ref: '#/components/schemas/RewardStyle'
          default: flat
    PageOfExamDefinition:
      type: object
      description: A page of ExamDefinition results.
      additionalProperties: false
      required:
      - items
      - total
      - page
      - pageSize
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ExamDefinition'
        total:
          type: integer
          description: Total number of matching exam definitions.
        page:
          type: integer
          description: 1-based page number.
        pageSize:
          type: integer
          description: Number of items per page.
    Difficulty:
      type: string
      description: Relative difficulty of a question.
      enum:
      - easy
      - medium
      - hard
    Option:
      type: object
      description: A single multiple-choice answer option. The id is server-assigned.
      additionalProperties: false
      required:
      - id
      - text
      properties:
        id:
          type: string
          description: Server-assigned identifier for this option (unique within a question).
        text:
          type: string
          description: The option's display text.
    Question:
      type: object
      description: A multiple-choice question with its answer key. This is the parent-facing (authoring)
        shape; the student receives DeliveredQuestion, which omits correctOptionId.
      additionalProperties: false
      required:
      - id
      - subjectId
      - text
      - options
      - correctOptionId
      - difficulty
      - enabled
      properties:
        id:
          type: string
          description: Unique question identifier.
        subjectId:
          type: string
          description: Subject this question belongs to.
        topicId:
          type: string
          description: Optional topic this question is scoped to.
        text:
          type: string
          description: The question prompt.
        options:
          type: array
          description: The answer options. At least four are required.
          minItems: 4
          items:
            $ref: '#/components/schemas/Option'
        correctOptionId:
          type: string
          description: The id of the option that is correct (must match an option's id).
        difficulty:
          $ref: '#/components/schemas/Difficulty'
          default: medium
        enabled:
          type: boolean
          description: Whether this question is eligible for selection into exams.
          default: true
    CreateQuestion:
      type: object
      description: Payload to author a new question. Options are supplied as plain texts and the correct
        one is identified by its index; the server assigns Option ids and resolves correctOptionId from
        correctOptionIndex.
      additionalProperties: false
      required:
      - subjectId
      - text
      - options
      - correctOptionIndex
      properties:
        subjectId:
          type: string
          description: Subject this question belongs to.
        topicId:
          type: string
          description: Optional topic this question is scoped to.
        text:
          type: string
          description: The question prompt.
        options:
          type: array
          description: The answer option texts. At least four are required.
          minItems: 4
          items:
            type: object
            additionalProperties: false
            required:
            - text
            properties:
              text:
                type: string
                description: The option's display text.
        correctOptionIndex:
          type: integer
          description: Zero-based index into options identifying the correct answer.
          minimum: 0
        difficulty:
          $ref: '#/components/schemas/Difficulty'
    DeliveredQuestion:
      type: object
      description: A question as delivered to the student during an exam — identical to Question but WITHOUT
        correctOptionId, so the answer key never leaves the server. Grading is performed server-side.
      additionalProperties: false
      required:
      - id
      - subjectId
      - text
      - options
      - difficulty
      - enabled
      properties:
        id:
          type: string
          description: Unique question identifier.
        subjectId:
          type: string
          description: Subject this question belongs to.
        topicId:
          type: string
          description: Optional topic this question is scoped to.
        text:
          type: string
          description: The question prompt.
        options:
          type: array
          description: The answer options. At least four are required.
          minItems: 4
          items:
            $ref: '#/components/schemas/Option'
        difficulty:
          $ref: '#/components/schemas/Difficulty'
          default: medium
        enabled:
          type: boolean
          description: Whether this question is eligible for selection into exams.
          default: true
    PageOfQuestion:
      type: object
      description: A paginated page of questions.
      additionalProperties: false
      required:
      - items
      - total
      - page
      - pageSize
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Question'
        total:
          type: integer
          description: Total number of questions matching the query.
        page:
          type: integer
          description: 1-based page number.
        pageSize:
          type: integer
          description: Number of items per page.
    ScoreEvent:
      type: object
      description: Immutable record of a single graded exam outcome. Emitted by Phase 1 on exam submission
        and consumed only by the Phase 3 Guardian. Carries the score and per-topic breakdown but no reward/minutes/time
        fields, which are Guardian-only.
      additionalProperties: false
      required:
      - attemptId
      - studentId
      - subjectId
      - examDefinitionId
      - scopeTopicIds
      - size
      - scorePct
      - passed
      - perTopic
      - timestamp
      properties:
        attemptId:
          type: string
          description: ID of the ExamAttempt (C06) this score came from.
        studentId:
          type: string
          description: ID of the Student (C07) who took the exam.
        subjectId:
          type: string
          description: ID of the Subject (C01) the exam belongs to.
        examDefinitionId:
          type: string
          description: ID of the ExamDefinition (C04) that produced the attempt.
        scopeTopicIds:
          type: array
          description: Topic IDs the exam was scoped to. Empty array means the whole subject (mirrors
            ExamDefinition.scopeTopicIds).
          items:
            type: string
        size:
          type: integer
          description: Number of questions in the attempt.
        scorePct:
          type: integer
          description: Final score as a whole percentage (0–100).
        passed:
          type: boolean
          description: Whether the attempt met the exam's pass bar.
        perTopic:
          type: array
          description: Per-topic correct/total breakdown for the attempt.
          items:
            $ref: '#/components/schemas/PerTopicScore'
        timestamp:
          type: string
          format: date-time
          description: RFC 3339 timestamp of when the score was recorded.
    KnowledgeBackend:
      type: string
      description: The swappable knowledge backend used by the AI tutor / ingestion (Phase 2). NotebookLM
        is the default; Gemini is the direct alternative.
      enum:
      - notebooklm
      - gemini
    Settings:
      type: object
      description: The application settings singleton. Holds the spec defaults that gate exam creation
        plus the Guardian-side reward knobs (stored now, used in Phase 3). L10 ResolveSettings fills any
        missing field from these same defaults at runtime.
      additionalProperties: false
      required:
      - id
      - rewardRateMinPerQ
      - dailyCapHours
      - defaultExamSize
      - defaultPassBar
      - defaultCooldownMin
      - knowledgeBackend
      - difficultyRamp
      properties:
        id:
          type: string
          description: Identifier of the settings singleton row.
        rewardRateMinPerQ:
          type: integer
          description: 'Guardian-side: minutes of earned time per correct question. Stored now, unused
            until Phase 3.'
          default: 3
        dailyCapHours:
          type: integer
          description: 'Guardian-side: maximum hours of earned time per day. Stored now, unused until
            Phase 3.'
          default: 3
        defaultExamSize:
          type: integer
          description: Default number of questions for a new exam definition.
          default: 20
        defaultPassBar:
          type: integer
          description: Default pass threshold (percent) for a new exam definition.
          default: 70
        defaultCooldownMin:
          type: integer
          description: Default cooldown (minutes) after a failed attempt.
          default: 10
        knowledgeBackend:
          allOf:
          - $ref: '#/components/schemas/KnowledgeBackend'
          description: The selected knowledge backend.
          default: notebooklm
        difficultyRamp:
          type: boolean
          description: Whether exam assembly ramps difficulty (easy -> hard) across the delivered questions.
          default: false
    SourceType:
      type: string
      description: The kind of study source.
      enum:
      - file
      - notebooklm
      - text
    SourceStatus:
      type: string
      description: Processing state of a source. Phase 1 sources are created `ready`; `processing` is
        reserved for Phase 2 async ingestion/OCR.
      enum:
      - processing
      - ready
    Source:
      type: object
      description: A study source attached to a subject.
      additionalProperties: false
      required:
      - id
      - subjectId
      - type
      - title
      - status
      - createdAt
      properties:
        id:
          type: string
          description: Unique source id (UUID/cuid).
        subjectId:
          type: string
          description: Id of the subject this source belongs to.
        type:
          $ref: '#/components/schemas/SourceType'
        title:
          type: string
          description: Human-readable title for the source.
        status:
          $ref: '#/components/schemas/SourceStatus'
          default: ready
        fileRef:
          type: string
          description: Storage reference for a `file` source (set only for files).
        url:
          type: string
          description: URL for a `notebooklm` source.
        text:
          type: string
          description: Inline content for a `text` source.
        createdAt:
          type: string
          format: date-time
          description: RFC 3339 creation timestamp.
    CreateSource:
      type: object
      description: Payload to create a new source. Server assigns id/status/createdAt.
      additionalProperties: false
      required:
      - subjectId
      - type
      - title
      properties:
        subjectId:
          type: string
          description: Id of the subject this source belongs to.
        type:
          $ref: '#/components/schemas/SourceType'
        title:
          type: string
          description: Human-readable title for the source.
        fileRef:
          type: string
          description: Storage reference for a `file` source.
        url:
          type: string
          description: URL for a `notebooklm` source.
        text:
          type: string
          description: Inline content for a `text` source.
    PageOfSource:
      type: object
      description: A page of sources (Page<Source>).
      additionalProperties: false
      required:
      - items
      - total
      - page
      - pageSize
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Source'
        total:
          type: integer
          description: Total number of sources matching the query.
        page:
          type: integer
          description: 1-based page number.
        pageSize:
          type: integer
          description: Number of items per page.
    Student:
      type: object
      description: A learner profile. Created by the parent during setup and used as the identity the
        student signs in as for exams.
      additionalProperties: false
      required:
      - id
      - name
      - createdAt
      properties:
        id:
          type: string
          description: Server-assigned unique identifier (UUID/cuid).
        name:
          type: string
          description: The student's display name.
          minLength: 1
        gradeLevel:
          type: string
          description: Optional grade / year level (free-form, e.g. "Grade 7").
        avatarUrl:
          type: string
          description: Optional URL to an avatar image.
        notes:
          type: string
          description: Optional free-form notes the parent keeps about the student.
        createdAt:
          type: string
          format: date-time
          description: RFC 3339 timestamp of when the student was created.
    CreateStudent:
      type: object
      description: Request body to create (or, in Phase 1, update via PUT) a student profile. The server
        assigns id and createdAt.
      additionalProperties: false
      required:
      - name
      properties:
        name:
          type: string
          description: The student's display name.
          minLength: 1
        gradeLevel:
          type: string
          description: Optional grade / year level (free-form, e.g. "Grade 7").
        avatarUrl:
          type: string
          description: Optional URL to an avatar image.
        notes:
          type: string
          description: Optional free-form notes the parent keeps about the student.
    Subject:
      type: object
      description: A unit of study a parent configures (e.g. "Algebra I").
      required:
      - id
      - name
      - archived
      - createdAt
      properties:
        id:
          type: string
          description: Server-assigned unique identifier (UUID/cuid).
        name:
          type: string
          minLength: 1
          description: Human-readable subject name.
        color:
          type: string
          description: Optional display color (e.g. hex token) for the subject.
        icon:
          type: string
          description: Optional icon identifier for the subject.
        description:
          type: string
          description: Optional longer description of the subject.
        archived:
          type: boolean
          default: false
          description: Whether the subject is archived (hidden from active lists).
        createdAt:
          type: string
          format: date-time
          description: RFC 3339 creation timestamp.
    CreateSubject:
      type: object
      description: Request body to create a Subject; server assigns id/createdAt and defaults archived=false.
      required:
      - name
      properties:
        name:
          type: string
          minLength: 1
          description: Human-readable subject name.
        color:
          type: string
          description: Optional display color (e.g. hex token) for the subject.
        icon:
          type: string
          description: Optional icon identifier for the subject.
        description:
          type: string
          description: Optional longer description of the subject.
    PageOfSubject:
      type: object
      description: A single page of Subject results (Page<Subject> per the common pagination pattern).
      required:
      - items
      - total
      - page
      - pageSize
      properties:
        items:
          type: array
          description: The Subjects in this page.
          items:
            $ref: '#/components/schemas/Subject'
        total:
          type: integer
          description: Total number of Subjects matching the query across all pages.
        page:
          type: integer
          description: 1-based page number of this result.
        pageSize:
          type: integer
          description: Maximum number of items per page.
    Topic:
      type: object
      description: A unit of study within a subject. May optionally point at a source and a page range.
        `order` controls syllabus position; `active` toggles whether the topic is in scope for exams.
      additionalProperties: false
      required:
      - id
      - subjectId
      - name
      - order
      - active
      properties:
        id:
          type: string
          description: Unique topic identifier (UUID/cuid).
        subjectId:
          type: string
          description: Identifier of the owning subject.
        name:
          type: string
          description: Human-readable topic name.
          minLength: 1
        sourceId:
          type: string
          description: Optional identifier of the source this topic is drawn from.
        pageStart:
          type: integer
          format: int32
          description: Optional first page of the topic within its source.
          minimum: 1
        pageEnd:
          type: integer
          format: int32
          description: Optional last page of the topic within its source. If both pages are present, pageEnd
            must be >= pageStart.
          minimum: 1
        order:
          type: integer
          format: int32
          description: Position of the topic in the subject's syllabus.
        active:
          type: boolean
          description: Whether the topic is active (in scope for exams).
          default: true
    CreateTopic:
      type: object
      description: Request body for creating a topic. Server assigns id and defaults.
      additionalProperties: false
      required:
      - subjectId
      - name
      properties:
        subjectId:
          type: string
          description: Identifier of the owning subject.
        name:
          type: string
          description: Human-readable topic name.
          minLength: 1
        sourceId:
          type: string
          description: Optional identifier of the source this topic is drawn from.
        pageStart:
          type: integer
          format: int32
          description: Optional first page of the topic within its source.
          minimum: 1
        pageEnd:
          type: integer
          format: int32
          description: Optional last page of the topic within its source. If both pages are present, pageEnd
            must be >= pageStart.
          minimum: 1
        order:
          type: integer
          format: int32
          description: Optional syllabus position; server assigns one if omitted.
    PageOfTopic:
      type: object
      description: A paginated page of topics (Page<Topic> per CONTRACTS.md §C11).
      additionalProperties: false
      required:
      - items
      - total
      - page
      - pageSize
      properties:
        items:
          type: array
          description: The topics on this page.
          items:
            $ref: '#/components/schemas/Topic'
        total:
          type: integer
          format: int32
          description: Total number of topics matching the query.
        page:
          type: integer
          format: int32
          description: 1-based page number.
        pageSize:
          type: integer
          format: int32
          description: Number of items per page.
    StartAttemptResult:
      type: object
      description: The result of starting an attempt — the attempt plus its delivered questions.
      additionalProperties: false
      required:
      - attempt
      - questions
      properties:
        attempt:
          $ref: '#/components/schemas/ExamAttempt'
        questions:
          type: array
          description: The delivered questions, in delivery order, without the answer key.
          items:
            $ref: '#/components/schemas/DeliveredQuestion'
    SubmitAttemptResult:
      type: object
      description: The result of submitting an attempt — the graded attempt plus the emitted ScoreEvent.
      additionalProperties: false
      required:
      - attempt
      - scoreEvent
      properties:
        attempt:
          $ref: '#/components/schemas/ExamAttempt'
        scoreEvent:
          $ref: '#/components/schemas/ScoreEvent'
    StudentSignIn:
      type: object
      description: Body to sign a student in for an exam session.
      additionalProperties: false
      required:
      - studentId
      properties:
        studentId:
          type: string
          description: The student signing in.
        pin:
          type: string
          description: Optional PIN gating the student sign-in.
    AuthResult:
      type: object
      description: The response of a WebAuthn ceremony step. During the begin step it carries opaque ceremony
        options; on a successful finish it carries the established Session. Both fields are optional;
        exactly one is present per step.
      additionalProperties: false
      properties:
        options:
          $ref: '#/components/schemas/WebAuthnCeremony'
        session:
          $ref: '#/components/schemas/Session'
    Progress:
      type: object
      description: 'A student''s progress summary: per-topic mastery, the current streak, and recent attempt
        history.'
      additionalProperties: false
      required:
      - studentId
      - mastery
      - streak
      - history
      properties:
        studentId:
          type: string
          description: The student this progress belongs to.
        mastery:
          type: array
          description: Per-topic mastery levels (0–100).
          items:
            $ref: '#/components/schemas/TopicMastery'
        streak:
          type: integer
          description: Current consecutive-pass streak (in days).
          minimum: 0
        history:
          type: array
          description: Recent exam attempts, newest first.
          items:
            $ref: '#/components/schemas/ExamAttempt'
    TopicMastery:
      type: object
      description: A single topic's mastery level for a student.
      additionalProperties: false
      required:
      - topicId
      - mastery
      properties:
        topicId:
          type: string
          description: The topic this mastery is for.
        mastery:
          type: integer
          description: Mastery level as a whole percentage (0–100).
          minimum: 0
          maximum: 100
    Conversation:
      type: object
      description: A tutor chat session between a student and the AI tutor, scoped to a subject.
      required:
      - id
      - subjectId
      - studentId
      - createdAt
      properties:
        id:
          type: string
          description: Server-assigned unique identifier (UUID/cuid).
        subjectId:
          type: string
          description: Subject this conversation is grounded in.
        studentId:
          type: string
          description: Student who owns this conversation.
        createdAt:
          type: string
          format: date-time
          description: RFC 3339 creation timestamp.
    CreateConversation:
      type: object
      description: Request body to start a tutor conversation; the server assigns id/createdAt.
      additionalProperties: false
      required:
      - subjectId
      - studentId
      properties:
        subjectId:
          type: string
          description: Subject this conversation is grounded in.
        studentId:
          type: string
          description: Student who owns this conversation.
    Message:
      type: object
      description: A single turn in a tutor Conversation, authored by the student or the AI tutor.
      required:
      - id
      - conversationId
      - role
      - text
      - createdAt
      properties:
        id:
          type: string
          description: Server-assigned unique identifier (UUID/cuid).
        conversationId:
          type: string
          description: Conversation this message belongs to.
        role:
          type: string
          enum:
          - user
          - assistant
          description: Who authored the message — the student (user) or the AI tutor (assistant).
        text:
          type: string
          description: Full message text.
        citations:
          type: array
          description: Source citations backing an assistant message (empty/absent for user messages).
          items:
            $ref: '#/components/schemas/Citation'
        createdAt:
          type: string
          format: date-time
          description: RFC 3339 creation timestamp.
    Citation:
      type: object
      description: A reference to a knowledge source backing an assistant answer.
      required:
      - sourceId
      - label
      properties:
        sourceId:
          type: string
          description: Identifier of the knowledge source being cited.
        label:
          type: string
          description: Human-readable label for the cited source (e.g. document title).
        locator:
          type: string
          description: Optional location within the source (e.g. page number, section, or anchor).
    AskRequest:
      type: object
      description: Request body to post a student message and stream the AI tutor's grounded answer.
      required:
      - conversationId
      - text
      properties:
        conversationId:
          type: string
          description: Conversation the message is posted to.
        text:
          type: string
          minLength: 1
          description: The student's question or message.
        topicId:
          type: string
          description: Optional topic to focus/ground the answer on.
    AnswerChunk:
      type: object
      description: |
        One Server-Sent Event chunk of a streamed AI tutor answer. Emitted as the
        JSON `data:` payload of a text/event-stream response. Clients concatenate
        `delta` values; `citations` may arrive on any chunk (typically the final
        one); `done=true` marks the end of the stream.
      required:
      - delta
      - done
      properties:
        delta:
          type: string
          description: Incremental text appended to the assistant's answer so far.
        citations:
          type: array
          description: Source citations for the answer, typically included on the final chunk.
          items:
            $ref: '#/components/schemas/Citation'
        done:
          type: boolean
          description: True on the terminal chunk, signalling the answer is complete.
    ConversationWithMessages:
      type: object
      description: A conversation together with its full message history (2-A03).
      additionalProperties: false
      required:
      - conversation
      - messages
      properties:
        conversation:
          $ref: '#/components/schemas/Conversation'
        messages:
          type: array
          description: The conversation's messages, in chronological order (newest last).
          items:
            $ref: '#/components/schemas/Message'
    StudyGuide:
      type: object
      description: An AI-generated, citation-grounded markdown study guide for a subject (optionally
        scoped to a topic).
      required:
      - id
      - subjectId
      - markdown
      - citations
      - generatedAt
      properties:
        id:
          type: string
          description: Server-assigned unique identifier (UUID/cuid).
        subjectId:
          type: string
          description: Identifier of the Subject this study guide belongs to.
        topicId:
          type: string
          description: Optional identifier of the Topic this guide is scoped to; omitted for
            whole-subject guides.
        markdown:
          type: string
          description: The study guide body rendered as Markdown.
        citations:
          type: array
          description: Source citations grounding the guide's content.
          items:
            $ref: '#/components/schemas/Citation'
        generatedAt:
          type: string
          format: date-time
          description: RFC 3339 timestamp of when the guide was generated.
    GuideRequest:
      type: object
      description: Request to generate (or fetch the latest) StudyGuide for a subject, optionally
        scoped to a topic.
      required:
      - subjectId
      properties:
        subjectId:
          type: string
          description: Identifier of the Subject to generate the study guide for.
        topicId:
          type: string
          description: Optional identifier of the Topic to scope the study guide to.
    Job:
      type: object
      description: >-
        An async unit of work (ingestion, syllabus derivation, or question
        generation) processed by the background worker. Clients poll for status.
      required:
      - id
      - type
      - status
      - subjectId
      - progress
      - createdAt
      - updatedAt
      properties:
        id:
          type: string
          description: Server-assigned unique identifier (UUID/cuid).
        type:
          type: string
          description: The kind of work this job performs.
          enum:
          - ingest
          - syllabus
          - questions
        status:
          type: string
          description: Lifecycle state of the job.
          enum:
          - queued
          - processing
          - ready
          - error
        subjectId:
          type: string
          description: The Subject this job operates on.
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: Completion percentage from 0 to 100.
        result:
          type: object
          additionalProperties: true
          description: >-
            Open result payload, present when status is ready. Its concrete shape
            is typed per job type at the use site (e.g. TopicSuggestion[] for
            type=syllabus).
        error:
          type: string
          description: Human-readable failure detail, present when status is error.
        createdAt:
          type: string
          format: date-time
          description: RFC 3339 creation timestamp.
        updatedAt:
          type: string
          format: date-time
          description: RFC 3339 timestamp of the last status/progress update.
    PageOfJob:
      type: object
      description: A paginated page of async jobs.
      additionalProperties: false
      required:
      - items
      - total
      - page
      - pageSize
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Job'
        total:
          type: integer
          description: Total number of jobs matching the query.
          minimum: 0
        page:
          type: integer
          description: 1-based page number.
          minimum: 1
        pageSize:
          type: integer
          description: Number of items per page.
          minimum: 1
    TopicSuggestion:
      type: object
      description: >
        A single suggested syllabus topic derived by the knowledge backend from
        ingested sources. Topics form a recursive tree via `children`.
      required:
      - name
      - order
      properties:
        name:
          type: string
          minLength: 1
          description: Human-readable topic name.
        sourceId:
          type: string
          description: >
            Optional id of the ingested Source this topic was derived from
            (UUID/cuid). Absent when the suggestion is not anchored to a source.
        pageStart:
          type: integer
          minimum: 1
          description: Optional 1-based start page in the source where this topic begins.
        pageEnd:
          type: integer
          minimum: 1
          description: Optional 1-based end page in the source where this topic ends.
        order:
          type: integer
          minimum: 0
          description: Zero-based ordering of this topic among its siblings.
        children:
          type: array
          description: Optional nested sub-topics (recursive).
          items:
            $ref: '#/components/schemas/TopicSuggestion'
    SuggestSyllabusResponse:
      type: object
      description: >
        Response to POST /subjects/{id}/syllabus/suggest. Syllabus derivation is
        async; poll GET /jobs/{jobId} for status. On completion Job.result holds
        a TopicSuggestion[].
      required:
      - jobId
      properties:
        jobId:
          type: string
          description: Id of the async Job (type=syllabus) driving the derivation.
    ApplySyllabusRequest:
      type: object
      description: >
        Request body for POST /subjects/{id}/syllabus/apply. Materializes the
        (possibly parent-edited) suggested topic tree into real Topics.
      required:
      - topics
      properties:
        topics:
          type: array
          description: The suggested topic tree to apply, in display order.
          items:
            $ref: '#/components/schemas/TopicSuggestion'
    QuestionDraftOption:
      type: object
      description: A candidate answer option on a generated draft. Plain text only; no id is assigned
        until the draft is approved into a Question.
      additionalProperties: false
      required:
      - text
      properties:
        text:
          type: string
          minLength: 1
          description: The option's display text.
    QuestionDraft:
      type: object
      description: >-
        An AI-generated multiple-choice question awaiting parent review. Mirrors
        the CreateQuestion authoring shape (options as plain texts plus a
        correctOptionIndex) so that approving a draft maps cleanly onto a real
        Question (C05). A draft has status pending until a parent approves
        (creates a Question) or rejects it.
      additionalProperties: false
      required:
      - id
      - subjectId
      - text
      - options
      - correctOptionIndex
      - difficulty
      - status
      properties:
        id:
          type: string
          description: Server-assigned unique identifier for this draft.
        subjectId:
          type: string
          description: Subject this draft belongs to.
        topicId:
          type: string
          description: Optional topic this draft is scoped to.
        text:
          type: string
          minLength: 1
          description: The question prompt.
        options:
          type: array
          description: The candidate answer options. At least four are required.
          minItems: 4
          items:
            $ref: '#/components/schemas/QuestionDraftOption'
        correctOptionIndex:
          type: integer
          description: Zero-based index into options identifying the correct answer.
          minimum: 0
        difficulty:
          $ref: '#/components/schemas/Difficulty'
          default: medium
        status:
          type: string
          description: Review status of the draft.
          enum:
          - pending
          - approved
          - rejected
          default: pending
    PageOfQuestionDraft:
      type: object
      description: A paginated page of question drafts.
      additionalProperties: false
      required:
      - items
      - total
      - page
      - pageSize
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/QuestionDraft'
        total:
          type: integer
          description: Total number of drafts matching the query.
          minimum: 0
        page:
          type: integer
          description: 1-based page number.
          minimum: 1
        pageSize:
          type: integer
          description: Number of items per page.
          minimum: 1
    GenRequest:
      type: object
      description: >-
        Request to generate question drafts for a subject (optionally scoped to
        a topic) via the knowledge backend. Generation is async; the API returns
        a Job whose result is the produced QuestionDraft list.
      additionalProperties: false
      required:
      - subjectId
      - count
      properties:
        subjectId:
          type: string
          description: Subject to generate questions for.
        topicId:
          type: string
          description: Optional topic to scope generation to.
        count:
          type: integer
          description: Number of question drafts to generate.
          minimum: 1
    TutorInstructions:
      type: object
      description: >-
        Per-subject configuration that steers the AI tutor's behaviour for a
        given subject (spec §2.7). Set/edited by a parent via
        GET/PUT /subjects/{id}/tutor-instructions.
      required:
      - subjectId
      - customInstructions
      properties:
        subjectId:
          type: string
          description: Identifier of the Subject these instructions apply to (UUID/cuid).
        customInstructions:
          type: string
          description: >-
            Free-text instructions the parent provides to shape how the tutor
            explains, questions, and encourages the student for this subject.
        tone:
          type: string
          description: >-
            Optional desired conversational tone for the tutor (e.g.
            "encouraging", "socratic", "concise").
        targetLanguage:
          type: string
          description: >-
            Optional language the tutor should respond in (e.g. a BCP 47 tag
            such as "en" or "es").
        difficulty:
          type: string
          description: >-
            Optional difficulty level the tutor should pitch explanations and
            follow-up questions at.
          enum:
          - easy
          - medium
          - hard
    Guidance:
      type: object
      description: >-
        Parent-authored guidance that steers the AI tutor's behaviour
        (spec §2.10). When scope is "global" it applies to every subject;
        when scope is "subject" it applies only to the subject named by
        subjectId.
      required:
      - id
      - scope
      - text
      - createdAt
      properties:
        id:
          type: string
          description: Server-assigned unique identifier (UUID/cuid).
        scope:
          type: string
          enum:
          - global
          - subject
          description: >-
            Whether this guidance applies to all subjects ("global") or to a
            single subject ("subject", in which case subjectId is set).
        subjectId:
          type: string
          description: >-
            Identifier of the subject this guidance is scoped to. Present only
            when scope is "subject".
        text:
          type: string
          minLength: 1
          description: The free-text guidance the tutor should follow.
        createdAt:
          type: string
          format: date-time
          description: RFC 3339 creation timestamp.
    CreateGuidance:
      type: object
      description: >-
        Request body to create or replace parent guidance; the server assigns
        id/createdAt. subjectId is required when scope is "subject" and must be
        omitted when scope is "global".
      required:
      - scope
      - text
      properties:
        scope:
          type: string
          enum:
          - global
          - subject
          description: >-
            Whether this guidance applies to all subjects ("global") or to a
            single subject ("subject", in which case subjectId is required).
        subjectId:
          type: string
          description: >-
            Identifier of the subject this guidance is scoped to. Required when
            scope is "subject"; omit when scope is "global".
        text:
          type: string
          minLength: 1
          description: The free-text guidance the tutor should follow.
    MasteryTimelinePoint:
      type: object
      description: >-
        A single dated mastery sample for a topic, used to plot how a topic's
        mastery has changed over time.
      additionalProperties: false
      required:
      - date
      - topicId
      - mastery
      properties:
        date:
          type: string
          format: date
          description: The calendar date (RFC 3339 full-date) of this sample.
        topicId:
          type: string
          description: The topic this sample belongs to.
        mastery:
          type: integer
          description: Mastery percentage for the topic on this date (0–100).
          minimum: 0
          maximum: 100
    Dashboard:
      type: object
      description: >-
        Aggregated parent-facing view of a student's progress: current per-topic
        mastery, mastery over time, recent exam history, an overall average
        score, the current study streak, and any parent guidance to the tutor.
        Contains no internet-time / reward fields (Guardian is off).
      additionalProperties: false
      required:
      - mastery
      - masteryTimeline
      - history
      - avgScore
      - streak
      - guidance
      properties:
        mastery:
          type: array
          description: Current mastery per topic.
          items:
            $ref: '#/components/schemas/TopicMastery'
        masteryTimeline:
          type: array
          description: Dated mastery samples per topic, for trend visualisation.
          items:
            $ref: '#/components/schemas/MasteryTimelinePoint'
        history:
          type: array
          description: The student's recent exam attempts, most recent first.
          items:
            $ref: '#/components/schemas/ExamAttempt'
        avgScore:
          type: integer
          description: Overall average score percentage across attempts (0–100).
          minimum: 0
          maximum: 100
        streak:
          type: integer
          description: Current consecutive-day study streak, in days.
          minimum: 0
        guidance:
          type: array
          description: Parent guidance entries currently steering the tutor.
          items:
            $ref: '#/components/schemas/Guidance'
