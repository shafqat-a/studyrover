# StudyRover — Common shapes: error body + pagination (C11)
#
# Authoritative definitions of the cross-cutting contract shapes shared by every
# endpoint: the RFC 7807-ish error body (Problem + Code enum) and the reusable
# pagination query parameters. Declares schemas under #/components/schemas and
# reusable parameters under #/components/parameters; the root document
# (contracts/openapi.yaml, owned by W01) assembles these via $ref. Codegen emits
# Go types (oapi-codegen -> backend/internal/contracts) and TS types
# (openapi-typescript -> frontend/src/api).
#
# Cross-language rule: JSON is camelCase; IDs are strings (UUID/cuid);
# timestamps are RFC 3339 strings. Defined once here; never redefined elsewhere.
#
# Conventions:
#   - Success responses return the resource / PageOf* directly with a 2xx status.
#   - Errors return a `Problem` body with the matching HTTP status code.
#   - Concrete `PageOf*` schemas live with each entity; this file defines only the
#     pagination request parameters (the page envelope shape is described here as a
#     human note, since OpenAPI has no generics).

components:
  schemas:
    Code:
      type: string
      description: >-
        Machine-readable error category. Maps to the matching HTTP status:
        VALIDATION->422/400, NOT_FOUND->404, UNAUTHORIZED->401, CONFLICT->409,
        INTERNAL->500.
      enum:
        - VALIDATION
        - NOT_FOUND
        - UNAUTHORIZED
        - CONFLICT
        - INTERNAL

    Problem:
      type: object
      description: >-
        RFC 7807-style problem detail returned for any error response. The HTTP
        status of the response matches the `status` field and the `code` category.
      additionalProperties: false
      required:
        - type
        - title
        - status
        - code
      properties:
        type:
          type: string
          description: >-
            A URI reference identifying the problem type. May be the literal
            "about:blank" when no specific type is defined.
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          description: The HTTP status code for this occurrence of the problem.
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence.
        code:
          $ref: '#/components/schemas/Code'

  parameters:
    PageParam:
      name: page
      in: query
      required: false
      description: 1-based page number to return.
      schema:
        type: integer
        minimum: 1
        default: 1

    PageSizeParam:
      name: pageSize
      in: query
      required: false
      description: Maximum number of items per page.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
