# StudyRover location block — insert INTO the existing
# `server { ... listen 443 ssl ... }` block of
# /etc/nginx/sites-available/home.cloudlabs.live (deploy.sh does this
# idempotently, before the `location / {` line).
#
# The Go binary (API + embedded SPA) listens on 127.0.0.1:8080 and serves at
# ROOT. The trailing slash on proxy_pass strips the /studyrover/ prefix. The SPA
# is built with Vite base=/studyrover/ (and Router basename + API base URL all
# = /studyrover), so every asset/API/deep-link URL carries the prefix and nginx
# maps it back to the app's root paths.

# STUDYROVER-BLOCK-START
location = /studyrover { return 301 /studyrover/; }
location /studyrover/ {
    proxy_pass http://127.0.0.1:8080/;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Server-Sent Events (Phase 2 AI tutor streaming): no buffering, long reads.
    proxy_buffering     off;
    proxy_read_timeout  3600s;

    client_max_body_size 50m;   # source/book uploads (Phase 2 ingestion)
}
# STUDYROVER-BLOCK-END
